<!DOCTYPE html>
<html lang="es">

<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#F2F2F7; --card:#FFFFFF; --text:#1C1C1E; --text2:#6C6C70; --text3:#AEAEB2;
  --sep:rgba(60,60,67,.12); --blue:#007AFF; --green:#34C759; --orange:#FF9500;
  --red:#FF3B30; --radius:16px; --toggle-off:#E5E5EA;
  --badge-green-text:#248A3D; --badge-orange-text:#C93400; --badge-red-text:#D70015;
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
body { font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; overflow-x:hidden; }

/* ── Header ── */
.header { position:sticky; top:0; z-index:100; padding-top:calc(var(--safe-top) + 12px); padding-bottom:12px; padding-inline:20px; background:rgba(242,242,247,.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--sep); display:flex; align-items:flex-end; justify-content:space-between; }
.header-title { font-size:28px; font-weight:700; letter-spacing:-.5px; }
.header-sub { font-size:13px; color:var(--text2); margin-top:2px; }
.header-right { display:flex; gap:10px; align-items:center; }
.btn-add { width:34px; height:34px; border-radius:50%; background:var(--blue); border:none; color:#fff; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,122,255,.35); transition:transform .1s,opacity .1s; }
.btn-add:active { transform:scale(.92); opacity:.85; }
.btn-logout { background:none; border:none; color:var(--text2); font-size:13px; font-family:inherit; cursor:pointer; padding:4px 0; }

/* ── Alerts ── */
.alerts { margin:16px 16px 0; border-radius:var(--radius); overflow:hidden; display:flex; flex-direction:column; gap:1px; }
.alert-item { background:var(--card); padding:13px 16px; display:flex; align-items:center; gap:12px; font-size:14px; animation:slideIn .3s ease; }
.alert-item:first-child{border-radius:var(--radius) var(--radius) 0 0;} .alert-item:last-child{border-radius:0 0 var(--radius) var(--radius);} .alert-item:only-child{border-radius:var(--radius);}
.alert-item.dose-now { background:rgba(0,122,255,.08); border-left:3px solid var(--blue); }
.alert-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.alert-dot.red{background:var(--red);} .alert-dot.orange{background:var(--orange);} .alert-dot.blue{background:var(--blue);}
.alert-text { flex:1; line-height:1.35; } .alert-text strong{font-weight:600;} .alert-text span{color:var(--text2);}

/* ── Section ── */
.section-label { font-size:13px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; padding:20px 32px 8px; }

/* ── Card list ── */
.card-list { margin:0 16px; border-radius:var(--radius); overflow:hidden; background:var(--card); }
.med-row { display:flex; align-items:center; padding:14px 16px; gap:14px; cursor:pointer; transition:background .15s; position:relative; animation:slideIn .25s ease; }
.med-row:not(:last-child)::after { content:''; position:absolute; bottom:0; left:74px; right:0; height:1px; background:var(--sep); }
.med-row:active { background:rgba(0,0,0,.04); }
.med-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.med-icon.ok{background:rgba(52,199,89,.15);} .med-icon.warn{background:rgba(255,149,0,.15);} .med-icon.danger{background:rgba(255,59,48,.15);}
.med-info { flex:1; min-width:0; } .med-name{font-size:16px;font-weight:600;} .med-dose{font-size:13px;color:var(--text2);margin-top:1px;}
.med-badges { display:flex; gap:6px; margin-top:5px; flex-wrap:wrap; }
.badge { font-size:11px; font-weight:600; padding:2px 7px; border-radius:20px; }
.badge.green{background:rgba(52,199,89,.15);color:#248A3D;} .badge.orange{background:rgba(255,149,0,.15);color:#C93400;} .badge.red{background:rgba(255,59,48,.15);color:#D70015;} .badge.gray{background:rgba(120,120,128,.12);color:var(--text2);}
.med-arrow { color:var(--text3); font-size:18px; }
.med-days { display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:44px; text-align:center; }
.med-days-num { font-size:18px; font-weight:700; line-height:1; }
.med-days-num.ok { color:var(--green); }
.med-days-num.warn { color:var(--orange); }
.med-days-num.danger { color:var(--red); }
.med-days-label { font-size:10px; color:var(--text2); margin-top:2px; font-weight:500; text-transform:uppercase; letter-spacing:.4px; }
.med-days-date { font-size:10px; color:var(--text2); margin-top:3px; }
.empty-state { text-align:center; padding:48px 32px; color:var(--text2); }
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;} .empty-state p{font-size:15px;line-height:1.5;}
.bottom-pad { height:calc(var(--safe-bot) + 24px); }

/* ── Sheet ── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s; }
.overlay.open { opacity:1; pointer-events:all; }
.sheet { width:100%; background:var(--bg); border-radius:20px 20px 0 0; padding-bottom:calc(var(--safe-bot) + 20px); transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1); max-height:92dvh; overflow-y:auto; }
.overlay.open .sheet { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; background:var(--text3); border-radius:2px; margin:10px auto 4px; }
.sheet-header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px 8px; }
.sheet-title { font-size:18px; font-weight:700; }
.btn-cancel,.btn-save { font-size:16px; background:none; border:none; cursor:pointer; padding:4px 0; font-family:inherit; }
.btn-cancel{color:var(--blue);} .btn-save{color:var(--blue);font-weight:600;}

/* ── Form ── */
.form-group { margin:8px 16px; border-radius:var(--radius); background:var(--card); overflow:hidden; }
.form-row { display:flex; align-items:center; padding:0 16px; gap:12px; position:relative; min-height:50px; }
.form-row:not(:last-child)::after { content:''; position:absolute; bottom:0; left:16px; right:0; height:1px; background:var(--sep); }
.form-label { font-size:15px; flex-shrink:0; width:130px; color:var(--text); }
.form-input { flex:1; border:none; outline:none; font-size:15px; font-family:inherit; color:var(--text); background:transparent; text-align:right; padding:14px 0; }
.form-input::placeholder{color:var(--text3);} .form-input[type="date"]{color-scheme:light;}
.form-section-label { font-size:13px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; padding:16px 32px 6px; }

/* Toggle */
.toggle-wrap { position:relative; display:inline-block; width:51px; height:31px; flex-shrink:0; }
.toggle-wrap input{opacity:0;width:0;height:0;}
.toggle-track { position:absolute; inset:0; border-radius:31px; transition:background .2s; cursor:pointer; }
.toggle-thumb { position:absolute; top:2px; width:27px; height:27px; border-radius:50%; background:#fff; box-shadow:0 2px 4px rgba(0,0,0,.3); transition:left .2s; }

/* Icon picker */
.icon-picker { display:flex; flex-wrap:wrap; gap:8px; padding:12px 16px; }
.icon-btn { width:44px; height:44px; border-radius:12px; border:2px solid transparent; background:var(--bg); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; }
.icon-btn.selected { border-color:var(--blue); background:rgba(0,122,255,.08); }

/* Stepper */
.stepper { display:flex; align-items:center; border:1.5px solid var(--sep); border-radius:8px; overflow:hidden; }
.stepper button { width:34px; height:34px; background:var(--bg); border:none; font-size:20px; color:var(--blue); cursor:pointer; font-family:inherit; }
.stepper button:active{background:var(--sep);}
.stepper span { width:44px; text-align:center; font-size:16px; font-weight:600; border-left:1.5px solid var(--sep); border-right:1.5px solid var(--sep); height:34px; line-height:34px; background:var(--card); }

/* Buttons */
.btn-whatsapp { display:flex; align-items:center; justify-content:center; gap:8px; width:calc(100% - 32px); margin:12px auto 8px; padding:15px; border-radius:var(--radius); border:none; background:#25D366; color:#fff; font-size:16px; font-weight:600; font-family:inherit; cursor:pointer; transition:opacity .15s; }
.btn-whatsapp:active{opacity:.8;}
.btn-delete { display:block; width:calc(100% - 32px); margin:0 auto 4px; padding:15px; border-radius:var(--radius); border:none; background:rgba(255,59,48,.1); color:var(--red); font-size:16px; font-weight:600; font-family:inherit; cursor:pointer; }
.btn-delete:active{opacity:.7;}
.btn-inline { border:none; border-radius:10px; padding:8px 14px; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; color:#fff; }
.btn-inline.blue{background:var(--blue);} .btn-inline.green{background:var(--green);}

.btn-notif { width:34px; height:34px; border-radius:50%; background:var(--card); border:none; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .1s; box-shadow:0 1px 4px rgba(0,0,0,.1); }
.btn-notif:active { transform:scale(.92); }

/* Loading */
.loading { text-align:center; padding:48px 32px; color:var(--text2); font-size:15px; }

@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:#1C1C1E; --card:#2C2C2E; --text:#FFFFFF; --text2:#AEAEB2; --text3:#636366;
    --sep:rgba(84,84,88,.65); --toggle-off:#3A3A3C;
    --badge-green-text:#30D158; --badge-orange-text:#FF9F0A; --badge-red-text:#FF453A;
  }
  .header { background:rgba(28,28,30,.85) !important; }
  .sheet { background:var(--bg); }
  .form-input[type="date"] { color-scheme:dark; }
  .badge.green { color:var(--badge-green-text) !important; }
  .badge.orange { color:var(--badge-orange-text) !important; }
  .badge.red { color:var(--badge-red-text) !important; }
  .med-row:active { background:rgba(255,255,255,.06); }
  .alert-item.dose-done { background:rgba(52,199,89,.08); border-left:3px solid var(--green); }
  .btn-notif { background:var(--card); }
}
.alert-item.dose-done { background:rgba(52,199,89,.08); border-left:3px solid var(--green); opacity:.75; }
</style>
</head>
<body>

<!-- App -->
<div id="appScreen">
  <div class="header">
    <div><div class="header-title">💊 Medicinas</div><div class="header-sub">Seguimiento de Ares</div></div>
    <div class="header-right">
      <button class="btn-notif" id="btnNotif" title="Notificaciones">🔕</button>
      <button class="btn-add" id="btnAdd">+</button>
    </div>
  </div>
  <div id="alertsContainer"></div>
  <div id="medList"></div>
  <div class="bottom-pad"></div>
</div>

<!-- Sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="btn-cancel" id="btnCancel">Cancelar</button>
      <span class="sheet-title" id="sheetTitle"></span>
      <button class="btn-save" id="btnSave">Guardar</button>
    </div>
    <div id="sheetBody"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCo9HRTa-HwnolhqR5HQITWXs8s60I3bTY",
  authDomain: "medicinas-ares.firebaseapp.com",
  projectId: "medicinas-ares",
  storageBucket: "medicinas-ares.firebasestorage.app",
  messagingSenderId: "766217962271",
  appId: "1:766217962271:web:9f4821229b69ace799a62a"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Constants ─────────────────────────────────────────────
const ICONS = ['💊','pill-red','pill-blue','🍶','💉','🟡','🟢','🟠','⚪','🩺'];
const UNITS = ['comprimidos','ml','gotas','cápsulas','sobres','parches'];
const WA_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

let meds = [];
let unsubscribe = null;

// ── Helpers ───────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }
function diffDays(ds) { return Math.round((new Date(ds)-new Date(today()))/86400000); }
function fmt(ds) { if(!ds) return '—'; const [y,m,d]=ds.split('-'); return `${d}/${m}/${y}`; }
function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function parseMin(t) { if(!t) return 0; const [h,m]=t.split(':').map(Number); return h*60+m; }

// ── Icons ─────────────────────────────────────────────────
function capsuleSVG(c1,c2,s) {
  s=s||30;
  return `<svg width="${s}" height="${s}" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g transform="rotate(-40 24 24)"><rect x="6" y="16" width="36" height="16" rx="8" fill="${c1}"/><rect x="24" y="16" width="18" height="16" fill="${c2}"/><rect x="34" y="16" width="8" height="16" rx="8" fill="${c2}"/><line x1="24" y1="16" x2="24" y2="32" stroke="rgba(255,255,255,.7)" stroke-width="1.5"/><rect x="6" y="16" width="36" height="16" rx="8" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="1"/></g></svg>`;
}
function iconHTML(ic,s) {
  if(ic==='pill-red')  return capsuleSVG('#E8311A','#F5F5F5',s||28);
  if(ic==='pill-blue') return capsuleSVG('#007AFF','#F5F5F5',s||28);
  return `<span style="font-size:${(s||28)*.75}px;line-height:1">${ic||'💊'}</span>`;
}
function iconLabel(ic) {
  if(ic==='pill-red')  return 'Cápsula roja/blanca';
  if(ic==='pill-blue') return 'Cápsula azul/blanca';
  return ic;
}

// ── Stock logic ───────────────────────────────────────────
function mlConsumedToday(med) {
  if(!med.schedule||!med.schedule.length) return 0;
  const now=nowMin();
  return med.schedule.reduce((sum,s)=>{
    const t=typeof s==='string'?s:s.time;
    const d=typeof s==='string'?0:parseFloat(s.dose)||0;
    return (t&&parseMin(t)<=now&&d>0)?sum+d:sum;
  },0);
}
function mlRemaining(med) {
  if(!med.bottleMode||med.mlRestantes==null||!med.mlPerDay) return null;
  const ref=med.lastUpdated||today();
  const daysElapsed=Math.max(0,-diffDays(ref));
  const mlWholeDays=daysElapsed*med.mlPerDay;
  const mlToday=mlConsumedToday(med);
  return Math.max(0,med.mlRestantes-mlWholeDays-mlToday);
}
function dailyDose(med) {
  if(med.schedule&&med.schedule.length){
    const sum=med.schedule.reduce((acc,s)=>{const d=typeof s==='string'?0:parseFloat(s.dose)||0;return acc+d;},0);
    if(sum>0) return sum;
  }
  return med.dosePerDay||0;
}
function effectiveStock(med) {
  const stock=med.stock||0;
  if(!med.lastUpdated) return stock;
  const dd=dailyDose(med);
  if(!dd||dd<=0) return stock;
  const daysElapsed=Math.max(0,-diffDays(med.lastUpdated));
  const consumedToday=mlConsumedToday(med);
  return Math.max(0,stock-daysElapsed*dd-consumedToday);
}
function daysLeft(med) {
  if(med.bottleMode){const ml=mlRemaining(med);if(ml===null||!med.mlPerDay)return null;return Math.floor(ml/med.mlPerDay);}
  const dd=dailyDose(med);
  if(!dd||dd<=0)return null;
  return Math.floor(effectiveStock(med)/dd);
}
function runOutInfo(med){
  if(med.bottleMode){
    const d=daysLeft(med); if(d===null) return null;
    const dt=new Date(); dt.setDate(dt.getDate()+d);
    return {label:dt.toLocaleDateString('es-ES',{day:'numeric',month:'short'}),time:null};
  }
  const slots=(med.schedule||[])
    .map(s=>({time:typeof s==='string'?s:s.time,dose:typeof s==='string'?0:parseFloat(s.dose)||0}))
    .filter(s=>s.time&&s.dose>0)
    .sort((a,b)=>a.time.localeCompare(b.time));
  if(slots.length){
    let stock=med.stock||0;
    const base=new Date(); base.setHours(0,0,0,0);
    let result=null;
    for(let day=0;day<=730;day++){
      if(stock<=0) break;
      const dt=new Date(base); dt.setDate(dt.getDate()+day);
      const lbl=dt.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
      let lastCovered=null, allOk=true;
      for(let i=0;i<slots.length;i++){
        if(stock>=slots[i].dose){ stock-=slots[i].dose; lastCovered=slots[i].time; }
        else { allOk=false; break; }
      }
      if(allOk){ result={label:lbl,time:null}; }
      else if(lastCovered){ result={label:lbl,time:lastCovered}; break; }
      else { break; }
      if(stock<=0) break;
    }
    return result;
  }
  const d=daysLeft(med); if(d===null) return null;
  const dt=new Date(); dt.setDate(dt.getDate()+d);
  return {label:dt.toLocaleDateString('es-ES',{day:'numeric',month:'short'}),time:null};
}
function stockStatus(med){const d=daysLeft(med);if(d===null)return 'ok';const a=med.alertDays||14;if(d<=a)return 'danger';if(d<=a*2)return 'warn';return 'ok';}
function expStatus(med){if(!med.expiry)return 'ok';const d=diffDays(med.expiry);if(d<0)return 'danger';if(d<=30)return 'warn';return 'ok';}
function overallStatus(med){const s=stockStatus(med),e=expStatus(med);if(s==='danger'||e==='danger')return 'danger';if(s==='warn'||e==='warn')return 'warn';return 'ok';}
function doseAlerts(med){
  if(!med.schedule||!med.schedule.length)return[];
  const now=nowMin(),W=30;
  return med.schedule.filter(s=>{const t=typeof s==='string'?s:s.time;return t&&Math.abs(parseMin(t)-now)<=W;})
    .map(s=>{const t=typeof s==='string'?s:s.time,dose=typeof s==='string'?'':s.dose||'',diff=parseMin(t)-now;return{time:t,dose,label:diff>0?`en ${diff} min`:diff===0?'¡ahora!':`hace ${Math.abs(diff)} min`};});
}

// ── Dose tracking (localStorage) ─────────────────────────
function doneKey(medId,time){return `done-${medId}-${time}-${today()}`;}
function isDone(medId,time){return !!localStorage.getItem(doneKey(medId,time));}
window.markDone=function(medId,time){localStorage.setItem(doneKey(medId,time),'1');renderAlerts();};

// ── Firestore ─────────────────────────────────────────────
function medsCol() { return collection(db, 'meds'); }

function startListening() {
  if (unsubscribe) unsubscribe();
  document.getElementById('medList').innerHTML = '<div class="loading">Cargando…</div>';
  unsubscribe = onSnapshot(query(medsCol()), snap => {
    meds = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Migrar meds sin lastUpdated para que el contador descuente desde hoy
    meds.forEach(med => {
      if (!med.bottleMode && !med.lastUpdated && dailyDose(med) > 0) {
        saveMed({ ...med, lastUpdated: today() });
      }
    });
    render();
  });
}

async function saveMed(data) {
  const col = medsCol();
  if (data.id) {
    const { id, ...rest } = data;
    await setDoc(doc(col, id), rest);
  } else {
    await addDoc(col, data);
  }
}

async function deleteMed(id) {
  await deleteDoc(doc(medsCol(), id));
}

startListening();

// ── Render ────────────────────────────────────────────────
function render() { renderAlerts(); renderList(); scheduleNotifications(); }

function renderAlerts() {
  const c=document.getElementById('alertsContainer');
  const items=[];
  meds.forEach(med=>{
    doseAlerts(med).forEach(a=>{
      const done=isDone(med.id,a.time);
      const schedUnit=med.bottleMode?'ml':(med.unit||'ud');
      const dtxt=a.dose?` · ${a.dose} ${schedUnit}`:'';
      const action=done
        ?`<span style="color:var(--green);font-size:20px;font-weight:700;flex-shrink:0">✓</span>`
        :`<button onclick="markDone('${med.id}','${a.time}')" style="flex-shrink:0;background:none;border:1.5px solid var(--sep);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;font-family:inherit">Dada</button>`;
      items.push({dot:done?'green':'blue',cls:done?'dose-done':'dose-now',text:`<strong>${med.name}</strong> <span>— toma ${a.time}${dtxt} (${a.label})</span>`,action});
    });
    const ss=stockStatus(med),es=expStatus(med),d=daysLeft(med);
    if(ss==='danger'&&d!==null)items.push({dot:'red',text:`<strong>${med.name}</strong> <span>— quedan ~${d} días. ¡Pide ya!</span>`});
    else if(ss==='warn'&&d!==null)items.push({dot:'orange',text:`<strong>${med.name}</strong> <span>— quedan ~${d} días. Pide pronto.</span>`});
    if(es==='danger'){const dd=diffDays(med.expiry);items.push({dot:'red',text:`<strong>${med.name}</strong> <span>— ${dd<0?`caducó hace ${Math.abs(dd)} días`:'caduca hoy'}.</span>`});}
    else if(es==='warn'){const dd=diffDays(med.expiry);items.push({dot:'orange',text:`<strong>${med.name}</strong> <span>— caduca en ${dd} días (${fmt(med.expiry)}).</span>`});}
  });
  if(!items.length){c.innerHTML='';return;}
  c.innerHTML=`<div class="section-label">Avisos</div><div class="alerts">${items.map(i=>`<div class="alert-item ${i.cls||''}"><div class="alert-dot ${i.dot}"></div><div class="alert-text">${i.text}</div>${i.action||''}</div>`).join('')}</div>`;
}

function renderList() {
  const c=document.getElementById('medList');
  if(!meds.length){c.innerHTML=`<div class="card-list" style="margin:16px"><div class="empty-state"><div class="empty-icon">💊</div><p>Aún no hay medicinas.<br>Pulsa <strong>+</strong> para añadir la primera.</p></div></div>`;return;}
  const order={'danger':0,'warn':1,'ok':2};
  const sorted=[...meds].sort((a,b)=>order[overallStatus(a)]-order[overallStatus(b)]);
  c.innerHTML=`<div class="section-label">Medicamentos (${meds.length})</div><div class="card-list">${sorted.map(med=>{
    const st=overallStatus(med),d=daysLeft(med),ml=med.bottleMode?mlRemaining(med):null;
    const badges=[];
    const sc=stockStatus(med),cls=sc==='danger'?'red':sc==='warn'?'orange':'green';
    if(med.bottleMode){
      if(ml!==null) badges.push(`<span class="badge ${cls}">~${Math.round(ml)} ml</span>`);
      else badges.push(`<span class="badge gray">Jarabe</span>`);
    } else if(d!==null){
      badges.push(`<span class="badge ${cls}">${med.stock} ${med.unit||'ud'}</span>`);
    } else {
      badges.push(`<span class="badge gray">${med.stock||0} ${med.unit||'ud'}</span>`);
    }
    if(med.expiry){const ec=expStatus(med),cls=ec==='danger'?'red':ec==='warn'?'orange':'gray';badges.push(`<span class="badge ${cls}">Cad. ${fmt(med.expiry)}</span>`);}
    if(med.schedule&&med.schedule.length){
      const schedUnit=med.bottleMode?'ml':(med.unit||'ud');
      const txt=med.schedule.map(s=>{const t=typeof s==='string'?s:s.time,dose=typeof s==='string'?'':s.dose;return dose?`${t}(${dose} ${schedUnit})`:t;}).join(' · ');
      badges.push(`<span class="badge gray">🕐 ${txt}</span>`);
    }
    const ic=med.icon||med.emoji||'💊';
    const roi=runOutInfo(med);
    const daysHTML=d!==null?`<div class="med-days"><div class="med-days-num ${sc}">${d}</div><div class="med-days-label">días</div>${roi?`<div class="med-days-date">${roi.label}${roi.time?` · ${roi.time}`:''}</div>`:''}</div>`:'';
    return `<div class="med-row" data-id="${med.id}"><div class="med-icon ${st}">${iconHTML(ic)}</div><div class="med-info"><div class="med-name">${med.name}</div><div class="med-dose">${med.dose||''}</div><div class="med-badges">${badges.join('')}</div></div>${daysHTML}<div class="med-arrow">›</div></div>`;
  }).join('')}</div>`;
  document.querySelectorAll('.med-row').forEach(r=>r.addEventListener('click',()=>openDetail(r.dataset.id)));
}

const overlay=document.getElementById('overlay');
function openSheet(){overlay.classList.add('open');document.body.style.overflow='hidden';}
function closeSheet(){overlay.classList.remove('open');document.body.style.overflow='';setTimeout(()=>{document.getElementById('sheetBody').innerHTML='';},300);}
overlay.addEventListener('click',e=>{if(e.target===overlay)closeSheet();});
document.getElementById('btnCancel').addEventListener('click',closeSheet);
document.getElementById('btnAdd').addEventListener('click',()=>openForm(null));

// ── Form ──────────────────────────────────────────────────
function slotHTML(s,i,unit){
  const t=typeof s==='string'?s:(s.time||''),d=typeof s==='string'?'':(s.dose||'');
  const u=unit||'ud';
  return `<div class="form-row schedule-slot" data-idx="${i}" style="${i>0?'border-top:1px solid var(--sep)':''}">
    <label class="form-label" style="width:60px;flex-shrink:0">Toma ${i+1}</label>
    <input class="form-input schedule-time" type="time" value="${t}" style="flex:1;text-align:center;min-width:0">
    <input class="form-input schedule-dose" type="number" min="0" step="0.1" value="${d}" placeholder="${u}" style="flex:1;text-align:right;min-width:0">
    <button type="button" onclick="removeSlot(${i})" style="background:none;border:none;color:var(--red);font-size:20px;padding:0 0 0 6px;cursor:pointer;line-height:1">×</button>
  </div>`;
}

function buildForm(med){
  const isSyrup=med.bottleMode;
  const sched=med.schedule&&med.schedule.length?med.schedule:[{time:'',dose:''}];

      <input type="hidden" id="f-icon" value="${ic}">
    </div>

    <div class="form-section-label">Stock</div>

window.toggleBottle = function(){
  const on=document.getElementById('f-bottle').checked;
  document.getElementById('stock-normal').style.display=on?'none':'';
  document.getElementById('stock-bottle').style.display=on?'':'none';
  document.getElementById('tt').style.background=on?'var(--green)':'var(--toggle-off)';
  document.getElementById('th').style.left=on?'22px':'2px';
};

window.selectIcon = function(val){
  document.getElementById('f-icon').value=val;
  document.querySelectorAll('.icon-btn').forEach(b=>b.classList.toggle('selected',b.dataset.icon===val));
};

window.addSlot = function(){
  const slots=document.getElementById('schedule-slots');
  const i=slots.querySelectorAll('.schedule-slot').length;
  const isSyrup=document.getElementById('f-bottle').checked;
  const unit=isSyrup?'ml':(document.getElementById('f-unit').value||'ud');
  slots.insertAdjacentHTML('beforeend',slotHTML({time:'',dose:''},i,unit));
};

window.removeSlot = function(idx){
  const slots=document.getElementById('schedule-slots');
  const all=slots.querySelectorAll('.schedule-slot');
  if(all.length<=1){all[0].querySelector('.schedule-time').value='';all[0].querySelector('.schedule-dose').value='';return;}
  all[idx]?.remove();
  slots.querySelectorAll('.schedule-slot').forEach((el,i)=>{el.dataset.idx=i;el.querySelector('.form-label').textContent=`Toma ${i+1}`;el.style.borderTop=i>0?'1px solid var(--sep)':'';});
};

function readForm(){
  const isSyrup=document.getElementById('f-bottle').checked;
  const schedule=Array.from(document.querySelectorAll('.schedule-slot')).map(el=>({
    time:el.querySelector('.schedule-time').value.trim(),
    dose:el.querySelector('.schedule-dose').value.trim()
  })).filter(s=>s.time).sort((a,b)=>a.time.localeCompare(b.time));
  const base={
    name:document.getElementById('f-name').value.trim(),
    dose:document.getElementById('f-dose').value.trim(),
    unit:document.getElementById('f-unit').value,
    icon:document.getElementById('f-icon').value,
    expiry:document.getElementById('f-expiry').value,
    notes:document.getElementById('f-notes').value.trim(),
    schedule,bottleMode:isSyrup
  };
  if(isSyrup){
    base.bottleMl=parseFloat(document.getElementById('f-bottleml').value)||null;
    const mlr=document.getElementById('f-mlrestantes').value;
    base.mlRestantes=mlr!==''?parseFloat(mlr):null;
    base.mlPerDay=parseFloat(document.getElementById('f-mlperday').value)||null;
    base.alertDays=parseInt(document.getElementById('f-alert-bottle').value)||7;
    base.lastUpdated=today();
    base.stock=null;base.dosePerDay=null;
  } else {
    base.stock=parseFloat(document.getElementById('f-stock').value)||0;
    base.dosePerDay=null;
    base.alertDays=parseInt(document.getElementById('f-alert').value)||14;
    base.lastUpdated=today();
    base.bottleMl=null;base.mlRestantes=null;base.mlPerDay=null;
  }
  return base;
}

function openForm(id){
  const isNew=id===null;
  const med=isNew?{name:'',dose:'',unit:'comprimidos',icon:'💊',expiry:'',notes:'',schedule:[],bottleMode:false,stock:0,dosePerDay:1,alertDays:14}:meds.find(m=>m.id===id);
  document.getElementById('sheetTitle').textContent=isNew?'Nueva medicina':'Editar medicina';
  document.getElementById('btnSave').textContent='Guardar';
  document.getElementById('btnSave').onclick=async()=>{
    const data=readForm();
    if(!data.name){alert('El nombre es obligatorio');return;}
    if(id) data.id=id;
    await saveMed(data);
    closeSheet();
  };
  document.getElementById('sheetBody').innerHTML=buildForm(med);
  document.getElementById('btnAddSlot').onclick=window.addSlot;
  openSheet();
}

// ── Detail ────────────────────────────────────────────────
function openDetail(id){
  const med=meds.find(m=>m.id===id);
  if(!med) return;
  const isSyrup=med.bottleMode;
  const ml=isSyrup?mlRemaining(med):null;
  const mlR=ml!==null?Math.round(ml*10)/10:null;

  function calcNewBottle(){
    if(!med.bottleMl) return '';
    const mlGiven=med.schedule&&med.schedule.length?med.schedule.reduce((sum,s)=>{
      const t=typeof s==='string'?s:s.time;
      const d=typeof s==='string'?0:parseFloat(s.dose)||0;
      return(t&&parseMin(t)<=nowMin())?sum+d:sum;
    },0):0;

  }

  const quickHTML=isSyrup?`
    <div class="form-section-label">Actualizar ml restantes</div>

      <div class="form-row" style="justify-content:space-between">

          <button class="btn-inline blue" id="q-save">Guardar</button>
        </div>
      </div>
      <div id="newbottle-wrap" style="border-top:1px solid var(--sep)">
        <div class="form-row" style="justify-content:space-between">
          <span class="form-label" style="line-height:1.4">Frasco nuevo<br><span style="font-size:12px;color:var(--text2)">Descuenta tomas ya dadas hoy</span></span>
          <button class="btn-inline green" id="q-newbottle">Abrir ahora</button>
        </div>
        <div id="newbottle-expiry" style="display:none;border-top:1px solid var(--sep)">
          <div class="form-row" style="justify-content:space-between">
            <span class="form-label">Fecha caducidad</span>
            <div style="display:flex;align-items:center;gap:8px">
              <input id="nb-expiry" type="date" style="border:1.5px solid var(--sep);border-radius:10px;padding:6px 8px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);color-scheme:light">
              <button class="btn-inline green" id="nb-confirm">Confirmar</button>
            </div>
          </div>
        </div>
      </div>
    </div>`:`
    <div class="form-section-label">Stock rápido</div>
    <div class="form-group">
      <div class="form-row" style="justify-content:space-between">
        <span class="form-label">Unidades</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="stepper"><button id="q-minus">−</button><span id="q-val">${med.stock||0}</span><button id="q-plus">+</button></div>
          <button class="btn-inline blue" id="q-save">Guardar</button>
        </div>
      </div>
    </div>`;

  document.getElementById('sheetTitle').textContent=med.name;
  document.getElementById('btnSave').textContent='Editar';
  document.getElementById('btnSave').onclick=()=>{closeSheet();setTimeout(()=>openForm(id),350);};
  document.getElementById('sheetBody').innerHTML=`
    ${quickHTML}
    <button class="btn-whatsapp" id="q-wa">${WA_SVG} Pedir a la farmacia</button>
    <div style="height:4px"></div>
    <button class="btn-delete" id="q-del">Eliminar medicina</button>

  if(isSyrup){
    document.getElementById('q-save').onclick=async()=>{

      const expiry=document.getElementById('nb-expiry').value;
      if(!expiry){document.getElementById('nb-expiry').focus();return;}
      await saveMed({...med,mlRestantes:calcNewBottle(),lastUpdated:today(),expiry});
      closeSheet();

  } else {

  document.getElementById('q-del').onclick=async()=>{
    if(confirm(`¿Eliminar ${med.name}?`)){await deleteMed(id);closeSheet();}
  };

  openSheet();
}

// ── Notifications ─────────────────────────────────────────
let swReg = null;
let notifTimeouts = [];

async function setupSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swReg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
  } catch(e) { console.warn('SW error:', e); }
}

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const p = await Notification.requestPermission();
  return p === 'granted';
}

async function showNotif(title, options) {
  if (Notification.permission !== 'granted') return;
  try {
    const reg = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, rej) => setTimeout(() => rej('timeout'), 4000))
    ]);
    // En iOS solo funciona desde el propio SW — usamos postMessage
    if (reg.active) {
      reg.active.postMessage({ type: 'SHOW_NOTIFICATION', title, options });
    } else {
      await reg.showNotification(title, options);
    }
  } catch(e) {
    // Fallback para navegadores no-iOS
    try { new Notification(title, options); } catch(e2) {}
  }
}

function scheduleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  notifTimeouts.forEach(clearTimeout);
  notifTimeouts = [];
  const now = nowMin();
  meds.forEach(med => {
    if (!med.schedule) return;
    med.schedule.forEach(s => {
      const t = typeof s === 'string' ? s : s.time;
      const dose = typeof s === 'string' ? '' : s.dose;
      if (!t) return;
      const schedMin = parseMin(t);
      const unit = med.bottleMode ? 'ml' : (med.unit || 'ud');
      const doseStr = dose ? ` · ${dose} ${unit}` : '';
      // Aviso 15 min antes
      const msWarning = (schedMin - 15 - now) * 60000;
      if (msWarning > 0 && msWarning <= 12 * 3600000) {
        notifTimeouts.push(setTimeout(() => showNotif(`⏰ ${med.name} en 15 min`, {
          body: `Toma a las ${t}${doseStr}`,
          icon: '/icon.svg', badge: '/icon.svg',
          tag: `${med.id}-${t}-warn`, renotify: false
        }), msWarning));
      }
      // Aviso en el momento
      const msNow = (schedMin - now) * 60000;
      if (msNow > 0 && msNow <= 12 * 3600000) {
        notifTimeouts.push(setTimeout(() => showNotif(`💊 ${med.name} — ahora`, {
          body: `Hora de la toma${doseStr}`,
          icon: '/icon.svg', badge: '/icon.svg',
          tag: `${med.id}-${t}`, renotify: true
        }), msNow));
      }
    });
  });
}

function updateNotifBtn() {
  const btn=document.getElementById('btnNotif');
  if(!btn||!('Notification' in window)) return;
  btn.textContent=Notification.permission==='granted'?'🔔':'🔕';
  btn.title=Notification.permission==='granted'?'Notificaciones activas':'Activar notificaciones';
}

document.getElementById('btnNotif').addEventListener('click', async () => {
  await setupSW();
  const granted = await requestNotifPermission();
  updateNotifBtn();
  if (granted) {
    scheduleNotifications();
    // Siempre muestra confirmación al pulsar el botón
    await showNotif('💊 Notificaciones activas', {
      body: 'Recibirás un aviso 15 min antes y en el momento de cada toma',
      icon: '/icon.svg', badge: '/icon.svg'
    });
  }
});

setupSW().then(() => {
  updateNotifBtn();
  if (Notification.permission === 'granted') scheduleNotifications();
});

// ── App icon (iOS Add to Home Screen) ─────────────────────
(function(){
  const size=512, r=115;
  const c=document.createElement('canvas');
  c.width=c.height=size;
  const ctx=c.getContext('2d');
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.arcTo(size,0,size,r,r);
  ctx.lineTo(size,size-r);ctx.arcTo(size,size,size-r,size,r);
  ctx.lineTo(r,size);ctx.arcTo(0,size,0,size-r,r);
  ctx.lineTo(0,r);ctx.arcTo(0,0,r,0,r);ctx.closePath();
  ctx.fillStyle='#007AFF';ctx.fill();
  ctx.font='300px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('💊',size/2,size/2+10);
  const url=c.toDataURL('image/png');
  const l=document.createElement('link');l.rel='apple-touch-icon';l.href=url;
  document.head.appendChild(l);
})();
</script>
